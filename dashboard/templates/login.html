<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian AI — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg0:#0a0a1a;--bg1:#10102a;--bg-card:rgba(20,20,50,.65);
            --glass:rgba(255,255,255,.08);--glow:rgba(99,102,241,.3);
            --t1:#f0f0ff;--t2:#8888aa;--t3:#555577;
            --accent:#6366f1;--accent-l:#818cf8;--red:#ef4444;
            --r:14px;--rs:8px;
        }
        body{font-family:'Inter',sans-serif;background:var(--bg0);color:var(--t1);
            min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        body::before{content:'';position:fixed;inset:-50%;width:200%;height:200%;
            background:radial-gradient(ellipse at 30% 40%,rgba(99,102,241,.1) 0%,transparent 50%),
                        radial-gradient(ellipse at 70% 70%,rgba(168,85,247,.06) 0%,transparent 40%);
            animation:bg 20s ease-in-out infinite alternate;z-index:0;pointer-events:none}
        @keyframes bg{0%{transform:translate(0,0)}100%{transform:translate(-2%,-2%) rotate(1deg)}}

        .login-card{position:relative;z-index:1;width:420px;max-width:90vw;
            background:var(--bg-card);border:1px solid var(--glass);
            backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
            border-radius:20px;padding:48px 40px;
            box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 0 1px rgba(99,102,241,.1)}

        .logo{display:flex;align-items:center;gap:14px;margin-bottom:32px;justify-content:center}
        .logo-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),#a855f7);
            border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;
            box-shadow:0 0 28px rgba(99,102,241,.4);animation:pulse 3s ease-in-out infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 24px rgba(99,102,241,.3)}50%{box-shadow:0 0 40px rgba(99,102,241,.55)}}
        .logo h1{font-size:24px;font-weight:800;
            background:linear-gradient(135deg,var(--t1),var(--accent-l));
            -webkit-background-clip:text;-webkit-text-fill-color:transparent}

        .subtitle{text-align:center;color:var(--t2);font-size:14px;margin-bottom:32px;line-height:1.5}

        .field{margin-bottom:20px}
        .field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;
            letter-spacing:.8px;color:var(--t3);margin-bottom:8px}
        .field input{width:100%;padding:14px 16px;background:rgba(0,0,0,.25);
            border:1px solid var(--glass);border-radius:var(--rs);color:var(--t1);
            font-family:inherit;font-size:14px;outline:0;transition:border .2s}
        .field input:focus{border-color:var(--accent)}
        .field input::placeholder{color:var(--t3)}

        .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#a855f7);
            border:none;border-radius:var(--rs);color:#fff;font-family:inherit;
            font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;
            box-shadow:0 4px 16px rgba(99,102,241,.3);margin-top:8px}
        .btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(99,102,241,.45)}
        .btn:active{transform:translateY(0)}

        .error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
            border-radius:var(--rs);padding:12px 16px;color:#f87171;font-size:13px;
            margin-bottom:20px;display:none;text-align:center}
        .error.show{display:block}

        .footer{text-align:center;margin-top:24px;font-size:12px;color:var(--t3)}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <h1>Guardian AI</h1>
        </div>
        <p class="subtitle">Security Dashboard — Authorised Personnel Only</p>

        {% if error %}
        <div class="error show">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <p class="footer">Protected by Guardian AI</p>
    </div>
</body>
</html>
