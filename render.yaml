# 🛡️ Guardian AI — Render Deployment Blueprint
# This file tells Render exactly how to build and orchestrate the engine, 
# the web dashboard, and the database automatically using your Dockerfile.

databases:
  # 1. Provision a free PostgreSQL database
  - name: guardian-db
    databaseName: guardian
    user: guardian
    plan: free

services:
  # 2. Deploy the Web Dashboard (Flask + Gunicorn)
  - type: web
    name: guardian-dashboard
    env: docker
    dockerCommand: gunicorn -w 4 -b 0.0.0.0:$PORT dashboard.app:app
    envVars:
      # Automatically link to the PostgreSQL database created above
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-db
          property: connectionString
      # The following vars will prompt you for secure input in the Render UI
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASS
        sync: false
      - key: DASHBOARD_SECRET_KEY
        sync: false

  # 3. Deploy the Slack Engine (Socket Mode Listener)
  - type: worker
    name: guardian-engine
    env: docker
    dockerCommand: python main.py
    envVars:
      # Automatically link to the exact same PostgreSQL database
      - key: DATABASE_URL
        fromDatabase:
          name: guardian-db
          property: connectionString
      
      # Core Engine Secrets (Prompted in Render UI)
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USER_MAP
        sync: false
      
      # Optional Settings
      - key: GUARDIAN_CHANNELS
        sync: false
      - key: GUARDIAN_SECURITY_CHANNEL
        sync: false
      - key: INTERNAL_AI_POLICY_URL
        sync: false
